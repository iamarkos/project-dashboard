services:
  api:
    build: .
    container_name: dashboard_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - minio
    volumes:
      - ./app:/app/app
      - ./tests:/app/tests

  db:
    image: postgres:15-alpine
    container_name: dashboard_postgres
    restart: always
    env_file:
      - .env
    ports:
      - "5433:5432" 
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio
    container_name: dashboard_minio
    restart: always
    env_file:
      - .env
    ports:
      - "9000:9000"   # API communication port
      - "9001:9001"   # Web UI dashboard port
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data: