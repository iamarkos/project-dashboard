name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test-and-lint:
    name: Run Checks and Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12" # Update if you use a different version

      - name: Install uv and Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install uv
          
          # Install testing tools
          uv pip install --system ruff pytest mypy
          
          # Install your app dependencies from pyproject.toml
          uv pip install --system -e .

      - name: Run Ruff Format Check
        # Fails the pipeline if code is not formatted properly
        run: |
          ruff format --check .

      - name: Run Ruff Linter
        # Fails the pipeline if there are syntax/linting errors
        run: |
          ruff check .
          
      - name: Run Mypy Type Checking
        run: |
          mypy app/

      - name: Run Unit Tests (No Database)
        env:
          ENV: testing
          POSTGRES_HOST: localhost
        run: |
          pytest tests/unit/